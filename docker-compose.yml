version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: lab_postgres
    restart: always
    environment:
      POSTGRES_USER: lab_user
      POSTGRES_PASSWORD: lab_password_2026
      POSTGRES_DB: lab_logs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: