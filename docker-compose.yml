services:
  mux-db:
    image: postgres:15-alpine
    container_name: mux-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER must be set in .env.prod}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env.prod}
      POSTGRES_DB: ${DB_NAME:?DB_NAME must be set in .env.prod}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    stop_grace_period: 60s

  mux-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${BUILD_NO_PROXY:-localhost,127.0.0.1,mux-db}
    container_name: mux-app
    restart: always
    depends_on:
      mux-db:
        condition: service_healthy
        restart: true
    ports:
      # Local HTTP development is loopback-only. A production TLS proxy can
      # reach this address; explicitly set 0.0.0.0 only after enabling TLS.
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-18080}:8080"
    environment:
      ENVIRONMENT: production
      DB_HOST: mux-db
      DB_PORT: "5432"
      APP_DB_USER: ${APP_DB_USER:?APP_DB_USER must be set in .env.prod}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD must be set in .env.prod}
      BACKUP_DB_USER: ${BACKUP_DB_USER:?BACKUP_DB_USER must be set in .env.prod}
      BACKUP_DB_PASSWORD: ${BACKUP_DB_PASSWORD:?BACKUP_DB_PASSWORD must be set in .env.prod}
      DB_NAME: ${DB_NAME:?DB_NAME must be set in .env.prod}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env.prod}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      # Direct HTTP is supported only for local development. Production must
      # terminate TLS and explicitly set COOKIE_SECURE=true.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:18080}
      BACKUP_DIR: /backups
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:?BACKUP_ENCRYPTION_KEY must be set in .env.prod}
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    volumes:
      - ./server/uploads:/app/uploads
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8000/ >/dev/null && curl --fail --silent http://127.0.0.1:8080/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  mux-scheduler:
    image: physics-lab-log-mux-app
    container_name: mux-scheduler
    restart: always
    depends_on:
      mux-db:
        condition: service_healthy
    environment:
      APP_ROLE: scheduler
      ENVIRONMENT: production
      DB_HOST: mux-db
      DB_PORT: "5432"
      APP_DB_USER: ${APP_DB_USER:?APP_DB_USER must be set in .env.prod}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?APP_DB_PASSWORD must be set in .env.prod}
      BACKUP_DB_USER: ${BACKUP_DB_USER:?BACKUP_DB_USER must be set in .env.prod}
      BACKUP_DB_PASSWORD: ${BACKUP_DB_PASSWORD:?BACKUP_DB_PASSWORD must be set in .env.prod}
      DB_NAME: ${DB_NAME:?DB_NAME must be set in .env.prod}
      BACKUP_DIR: /backups
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:?BACKUP_ENCRYPTION_KEY must be set in .env.prod}
    volumes:
      - ./backups:/backups
    healthcheck:
      disable: true

  mux-migrator:
    image: physics-lab-log-mux-app
    profiles: ["migration"]
    environment:
      APP_ROLE: migrator
      ENVIRONMENT: production
      DB_HOST: mux-db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:?DB_USER must be set in .env.prod}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env.prod}
      DB_NAME: ${DB_NAME:?DB_NAME must be set in .env.prod}

volumes:
  postgres_prod_data:
    # Fixed name deliberately reuses the database volume from the previous
    # four-container deployment instead of creating an empty project-scoped one.
    name: ${DB_VOLUME_NAME:-physics-lab-log_postgres_prod_data}
