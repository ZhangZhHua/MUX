services:
  mux-db:
    image: postgres:15-alpine
    container_name: mux_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    expose:
      - "5432"

  mux-backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mux_backend
    restart: always
    depends_on:
      - mux-db
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@mux-db:5432/${DB_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    volumes:
      - ./server/uploads:/app/uploads
    expose:
      - "8000"

  mux-frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mux_frontend
    restart: always
    expose:
      - "80"

  mux-nginx:
    image: nginx:stable-alpine
    container_name: mux_gateway
    restart: always
    ports:
      - "${APP_PORT:-18080}:80"
    depends_on:
      - mux-backend
      - mux-frontend
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_prod_data:
